# Справочник сопоставлений параметров Metabase ↔ поля витрины PostgreSQL.
# Используется как «проект по умолчанию» при правке дашбордов и провижининга.
#
# Источник истины для карточек: JSON в этом каталоге (*.json).
# Провижининг: metabase/setup-dashboards.sh подставляет dimension ["field", id, null]
# из объекта metabase-field-filters у каждой карточки (см. docs/METABASE.md).

version: 1

meta:
  provisioning_script: metabase/setup-dashboards.sh
  documentation: docs/METABASE.md
  notes:
    - Переменная dwh_date — тип dimension (native field filter по дате); для каждой карточки физическое поле задаётся отдельно в metabase-field-filters.
    - Переменные top_semd, top_clinic, err_parse_code — тип text в SQL; явное равенство колонке в запросе. В экспорт из API (metabase/export_dashboards_from_api.py) они не попадают в metabase-field-filters.
    - "Идентификаторы LOGID/EGMID: во витрине v_egisz_transactions_enriched_ui колонки «LOGID журнала EXCHANGELOG» и «EGMID сообщения EGISZ_MESSAGES» — тип text (::text в sql/001_schema.sql), без разделителей тысяч; в Metabase не используйте Sum/Average — только Count distinct или строка."
    - "Доп. фильтры (идея): string/= по «LOGID журнала…» / «EGMID сообщения…» как переменные {{log_id}} / {{egmid}} с [[AND v.\"…\" = {{log_id}}]] — имеет смысл на 01 «Последние операции» и детальных таблицах; на агрегатах потребуется HAVING или подзапрос по id."

# Ниже — не подключено к JSON дашбордов; ориентир при добавлении новых string/= фильтров.
possible_identifier_filters:
  log_id:
    dashboard_slug: log_id_filter
    template_tag: log_id
    widget: string/=
    example_sql_fragment: >-
      [[AND NULLIF(TRIM(v."LOGID журнала EXCHANGELOG"), '') = {{log_id}}]]
    primary_table: v_egisz_transactions_enriched_ui
  egmid:
    dashboard_slug: egmid_filter
    template_tag: egmid
    widget: string/=
    example_sql_fragment: >-
      [[AND NULLIF(TRIM(v."EGMID сообщения EGISZ_MESSAGES"), '') = {{egmid}}]]
    primary_table: v_egisz_transactions_enriched_ui

# Один логический «диапазон дат» на дашборде (slug dwh_date_filter), но при привязке к карточке Metabase использует поле из metabase-field-filters этой карточки.
dwh_date_bindings:
  by_logical_scope:
    processed_ips:
      table_ref: v_egisz_transactions_enriched_ui
      field_name: Обработано IPS
      sql_fragment: '[[AND {{dwh_date}}]]'
    chart_day:
      table_ref: v_egisz_transactions_enriched_ui
      field_name: День (тренд)
      sql_fragment: '[[AND {{dwh_date}}]]'
    queue_sent:
      table_ref: v_rpt_documents_no_response_ui
      field_name: Отправлено
      sql_fragment: '[[AND {{dwh_date}}]]'
    parse_errors_created:
      table_ref: v_stg_parse_errors_by_document
      field_name: created_at
      sql_fragment: '[[AND {{dwh_date}}]]'

# Текстовые переменные вопроса (не dimension в смысле export_dashboards_from_api).
text_parameter_bindings:
  top_semd:
    dashboard_slug: top_semd_filter
    template_tag: top_semd
    widget: string/=
    equality_targets:
      - table: v_egisz_transactions_enriched_ui
        expression: 'NULLIF(TRIM("Код СЭМД"), '''') = {{top_semd}}'
      - table: v_rpt_documents_no_response_ui
        expression: 'NULLIF(TRIM(v."Код СЭМД"), '''') = {{top_semd}}' # alias v в 04
  top_clinic:
    dashboard_slug: top_clinic_filter
    template_tag: top_clinic
    widget: string/=
    equality_targets:
      - table: v_egisz_transactions_enriched_ui
        expression: '"JID клиники"::text = {{top_clinic}}'
      - table: v_rpt_documents_no_response_ui
        expression: 'v."JID клиники"::text = {{top_clinic}}'
      - table: v_health_by_clinic_ui
        expression: '"JID клиники"::text = {{top_clinic}}'
      - table: fact_egisz_transactions
        expression: 'f.jid::text = {{top_clinic}}'
  err_parse_code:
    dashboard_slug: err_parse_code_filter
    template_tag: err_parse_code
    widget: string/=
    equality_targets:
      - table: stg_parse_errors
        expression: 'error_code::text = {{err_parse_code}}'
      - table: v_stg_parse_errors_by_document
        expression: 'error_code::text = {{err_parse_code}}'

dashboards:
  - file: 01_operational.json
    name: 01 Оперативный мониторинг
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
      - slug: top_semd_filter
        maps_to: top_semd
      - slug: top_clinic_filter
        maps_to: top_clinic
    primary_source: v_egisz_transactions_enriched_ui
    cards:
      - name: Последние операции
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Статусы за период
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Доля ошибок по СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Топ типов СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: По клиникам (имя)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Ошибки по типу
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: "% Ошибок за период"
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Доля ошибок по клиникам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]

  - file: 02_service.json
    name: 02 Сервис интеграции
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
      - slug: top_semd_filter
        maps_to: top_semd
      - slug: top_clinic_filter
        maps_to: top_clinic
    cards:
      - name: 02 · Топ типов СЭМД (поток)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: 02 · Объём по клиникам (поток)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]

  - file: 03_errors.json
    name: 03 Ошибки и разбор
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
      - slug: err_parse_code_filter
        maps_to: err_parse_code
    cards:
      - name: "03 · Парсинг: строки журнала vs уникальные документы"
        table_ref: v_stg_parse_errors_by_document
