      - name: 05 · Успешных документов
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 05 · Доля ошибок по срезам (таблица)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: "05 · Очередь: документов в ожидании"
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
      - name: 05 · Рейтинг формулировок ошибок ЕГИСЗ
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 05 · Рейтинг ошибок по коду СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 05 · Рейтинг клиник по ошибкам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: "05 · Очередь: срок ожидания"
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
