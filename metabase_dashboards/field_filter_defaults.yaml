# Справочник для авторов дашбордов (не используется скриптами провижининга).
#
# Импорт: metabase/setup-dashboards.sh подставляет dimension ["field", id, null] только если у карточки
# в JSON есть блок metabase-field-filters с точным table_ref и field_name, совпадающим с именем или
# display_name поля в метаданных Metabase после sync_schema. Эвристики и автоподбор столбца убраны:
# при несовпадении provisioning не прерывается, тип виджета остаётся из template-tags в JSON.
#
# Параметры дашборда: без значений по умолчанию для периода — период задаёт пользователь.
# Автоприменение при открытии: METABASE_AUTO_APPLY_FILTERS по умолчанию true в setup-dashboards.sh; отключить — false.

version: 1
