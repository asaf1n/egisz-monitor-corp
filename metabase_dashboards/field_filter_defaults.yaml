# Справочник сопоставлений параметров Metabase ↔ поля витрины PostgreSQL.
# Используется как «проект по умолчанию» при правке дашбордов и провижининга.
#
# Источник истины для карточек: JSON в этом каталоге (*.json).
# Провижининг: metabase/setup-dashboards.sh подставляет dimension ["field", id, null]
# из объекта metabase-field-filters у каждой карточки (см. README и комментарии в этом файле).

version: 1

meta:
  provisioning_script: metabase/setup-dashboards.sh
  documentation: README.md
  notes:
    - Переменная dwh_date — тип dimension (native field filter по дате); для каждой карточки физическое поле задаётся отдельно в metabase-field-filters.
    - Переменные top_semd, top_clinic, err_parse_code — тип text в SQL; явное равенство колонке в запросе. В экспорт из API (metabase/export_dashboards_from_api.py) они не попадают в metabase-field-filters.
    - "Идентификаторы LOGID/EGMID: во витрине v_egisz_transactions_enriched_ui колонки «LOGID журнала EXCHANGELOG» и «EGMID сообщения EGISZ_MESSAGES» — тип text (::text в sql/001_schema.sql), без разделителей тысяч; в Metabase не используйте Sum/Average — только Count distinct или строка."
    - "Доп. фильтры (идея): string/= по «LOGID журнала…» / «EGMID сообщения…» как переменные {{log_id}} / {{egmid}} с [[AND v.\"…\" = {{log_id}}]] — имеет смысл на 01 «Последние операции» и детальных таблицах; на агрегатах потребуется HAVING или подзапрос по id."

# Ниже — не подключено к JSON дашбордов; ориентир при добавлении новых string/= фильтров.
possible_identifier_filters:
  log_id:
    dashboard_slug: log_id_filter
    template_tag: log_id
    widget: string/=
    example_sql_fragment: >-
      [[AND NULLIF(TRIM(v."LOGID журнала EXCHANGELOG"), '') = {{log_id}}]]
    primary_table: v_egisz_transactions_enriched_ui
  egmid:
# Универсальные фильтры-идентификаторы: используются как text-переменные (string/=) в native SQL и
# добавляются на дашборды (01–06) для “поиска” по ключевым реквизитам, когда Metabase UI не даёт
# фильтрацию по произвольной колонке результата.
universal_identifier_filters:
  local_uid:
    dashboard_slug: local_uid_filter
    template_tag: local_uid
    widget: string/=
    notes: localUid СЭМД (DOCUMENTID / localUid из SOAP)
  relates_to:
    dashboard_slug: relates_to_filter
    template_tag: relates_to
    widget: string/=
    notes: relatesToMessage / "Связанное сообщение"
  emdr_id:
    dashboard_slug: emdr_id_filter
    template_tag: emdr_id
    widget: string/=
    notes: emdrId / "Рег. номер РЭМД"
  status:
    dashboard_slug: status_filter
    template_tag: status
    widget: string/=
    notes: статус факта (success/error/unknown)
  log_id:
    dashboard_slug: log_id_filter
    template_tag: log_id
    widget: string/=
    notes: EXCHANGELOG.LOGID (идентификатор строки журнала)
  egmid:
    dashboard_slug: egmid_filter
    template_tag: egmid
    widget: string/=
    notes: EGISZ_MESSAGES.EGMID (ключ записи сообщения, РЭМД)
    dashboard_slug: egmid_filter
    template_tag: egmid
    widget: string/=
    example_sql_fragment: >-
      [[AND NULLIF(TRIM(v."EGMID сообщения EGISZ_MESSAGES"), '') = {{egmid}}]]
    primary_table: v_egisz_transactions_enriched_ui

# Один логический «диапазон дат» на дашборде (slug dwh_date_filter), но при привязке к карточке Metabase использует поле из metabase-field-filters этой карточки.
# На дашборде 02 для stg_channel_errors используется отдельный slug `parse_created_filter` → переменная `parse_created` в native SQL.
dwh_date_bindings:
  by_logical_scope:
    processed_ips:
      table_ref: v_egisz_transactions_enriched_ui
      field_name: Обработано IPS
      sql_fragment: '[[AND {{dwh_date}}]]'
    chart_day:
      table_ref: v_egisz_transactions_enriched_ui
      field_name: День (тренд)
      sql_fragment: '[[AND {{dwh_date}}]]'
    queue_sent:
      table_ref: v_rpt_documents_no_response_ui
      field_name: Отправлено
      sql_fragment: '[[AND {{dwh_date}}]]'
    channel_errors_created:
      table_ref: v_stg_channel_errors_by_document
      field_name: created_at
      sql_fragment: '[[AND {{dwh_date}}]]'
    parse_created_staging:
      table_ref: v_stg_channel_errors_by_document
      field_name: created_at
      sql_fragment: '[[AND {{parse_created}}]]'

# Текстовые переменные вопроса (не dimension в смысле export_dashboards_from_api).
text_parameter_bindings:
  top_semd:
    dashboard_slug: top_semd_filter
    template_tag: top_semd
    widget: string/=
    equality_targets:
      - table: v_egisz_transactions_enriched_ui
        expression: 'NULLIF(TRIM("Код СЭМД"), '''') = {{top_semd}}'
      - table: v_rpt_documents_no_response_ui
        expression: 'NULLIF(TRIM(v."Код СЭМД"), '''') = {{top_semd}}' # alias v в 03
  top_clinic:
    dashboard_slug: top_clinic_filter
    template_tag: top_clinic
    widget: string/=
    equality_targets:
      - table: v_egisz_transactions_enriched_ui
        expression: '"JID клиники"::text = {{top_clinic}}'
      - table: v_rpt_documents_no_response_ui
        expression: 'v."JID клиники"::text = {{top_clinic}}'
      - table: v_health_by_clinic_ui
        expression: '"JID клиники"::text = {{top_clinic}}'
      - table: fact_egisz_transactions
        expression: 'f.jid::text = {{top_clinic}}'
  err_parse_code:
    dashboard_slug: err_parse_code_filter
    template_tag: err_parse_code
    widget: string/=
    equality_targets:
      - table: stg_channel_errors
        expression: 'error_code::text = {{err_parse_code}}'
      - table: v_stg_channel_errors_by_document
        expression: 'error_code::text = {{err_parse_code}}'

dashboards:
  - file: 01_operational.json
    name: 01 Оперативный мониторинг и динамика
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
      - slug: top_semd_filter
        maps_to: top_semd
      - slug: top_clinic_filter
        maps_to: top_clinic
    primary_source: v_egisz_transactions_enriched_ui
    cards:
      - name: Последние операции
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Статусы за период
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Доля ошибок по СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Топ типов СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: По клиникам (имя)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Ошибки по типу
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: "% Ошибок за период"
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: Доля ошибок по клиникам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: 01 · Транзакции по дням и статусам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: День (тренд) }
      - name: 01 · Динамика по типам СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: День (тренд) }
      - name: 01 · Доля ошибок по дням
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: День (тренд) }
      - name: 01 · Объём по часам (72 ч)
        table_ref: v_egisz_transactions_enriched_ui
        native_filters: none
        note: Окно 72 ч от MAX(Обработано IPS); глобальный dwh_date к SQL не подключён.

  - file: 02_service.json
    name: 02 Сервис, healthcheck и сбои канала
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
        note: Витрина «Обработано IPS»; healthcheck без даты в SQL не использует.
      - slug: top_semd_filter
        maps_to: top_semd
      - slug: top_clinic_filter
        maps_to: top_clinic
      - slug: parse_created_filter
        maps_to: parse_created
        note: Только карточки детализации stg_channel_errors (created_at).
      - slug: err_parse_code_filter
        maps_to: err_parse_code
    cards:
      - name: 02 · Топ типов СЭМД (поток)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: 02 · Объём по клиникам (поток)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: 02 · Сигналы healthcheck
        table_ref: v_health_signals_ui
        native_filters: none
      - name: 02 · Сводка по уровням (сигналы)
        table_ref: v_health_signals_ui
        native_filters: none
      - name: 02 · Топ клиник по error rate (24ч)
        table_ref: v_health_by_clinic_ui
        other_variables: [top_clinic]
        native_filters: none
      - name: 02 · Heatmap клиники × дни (доля ошибок)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
        other_variables: [top_semd, top_clinic]
      - name: 02 · Возраст очереди без ответа
        table_ref: v_health_proxy_db_ui
        native_filters: none
      - name: 02 · Тренд сбоев канала
        table_ref: v_stg_channel_errors_by_document
        metabase-field-filters:
          parse_created: { table_ref: v_stg_channel_errors_by_document, field_name: created_at }
      - name: 02 · Сводка прокси-БД
        table_ref: v_health_proxy_db_ui
        native_filters: none
      - name: "02 · Канал: строки vs уникальные документы"
        table_ref: v_stg_channel_errors_by_document
        metabase-field-filters:
          parse_created: { table_ref: v_stg_channel_errors_by_document, field_name: created_at }
        other_variables: [err_parse_code]
      - name: 02 · Сбои канала (stg_channel_errors)
        table_ref: v_stg_channel_errors_by_document
        metabase-field-filters:
          parse_created: { table_ref: v_stg_channel_errors_by_document, field_name: created_at }
        other_variables: [err_parse_code]

  - file: 03_documents_no_response.json
    name: 03 Документы без ответа
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
      - slug: top_semd_filter
        maps_to: top_semd
      - slug: top_clinic_filter
        maps_to: top_clinic
    cards:
      - name: 03 · Очередь без ответа (список)
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
        other_variables: [top_semd, top_clinic]
      - name: 03 · Топ клиник с зависшими документами
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
        other_variables: [top_semd, top_clinic]
      - name: 03 · Возраст зависших документов
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
        other_variables: [top_semd, top_clinic]
      - name: 03 · Зависшие по типам СЭМД
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
        other_variables: [top_semd, top_clinic]
      - name: 03 · Зависшие — детализация
        table_ref: v_rpt_documents_no_response_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_rpt_documents_no_response_ui, field_name: Отправлено }
        other_variables: [top_semd, top_clinic]

  - file: 04_quality_and_errors.json
    name: 04 Ошибки и качество данных
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
    cards:
      - name: 04 · Успешность по клиникам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Успешность по типам СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: "04 · JID/OID: целостность"
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Полнота полей витрины
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Топ причин отказов ЕГИСЗ
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Ошибки по клиникам и СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Итоги по ошибкам за период
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Ошибки по типу
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Доля ошибок по СЭМД
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Доля ошибок по клиникам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Рейтинг типов ошибок (топ-25)
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Рейтинг СЭМД по числу ошибок
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: 04 · Рейтинг клиник по ошибкам
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: "04 · Матрица: тип СЭМД × тип ошибки"
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }
      - name: "04 · Сводка: тип ошибки × СЭМД × клиника"
        table_ref: v_egisz_transactions_enriched_ui
        metabase-field-filters:
          dwh_date: { table_ref: v_egisz_transactions_enriched_ui, field_name: Обработано IPS }

  - file: 05_executive.json
    name: 05 Управление СЭМД
    parameters:
      - slug: dwh_date_filter
        maps_to: dwh_date
    notes:
      - Карточки витрины — «Обработано IPS»; карточки очереди — «Отправлено». Архив вынесен в 06_semd_archive.json.
