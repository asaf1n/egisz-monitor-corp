# Однократно (после каждого delete job): создаёт БД metabase для application DB Metabase (MB_DB_*).
# Витрина egisz_reports не затрагивается. Вызывается из start.ps1 перед apply deployment/metabase.
apiVersion: batch/v1
kind: Job
metadata:
  name: egisz-metabase-app-db-ensure
  namespace: egisz-monitor
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: ensure-metabase-db
          image: postgres:16-bookworm
          envFrom:
            - secretRef:
                name: postgres-credentials
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              export PGPASSWORD="${POSTGRES_PASSWORD}"
              HOST="postgres"
              until pg_isready -h "$HOST" -U "$POSTGRES_USER" -d postgres; do
                echo "waiting for postgres..."
                sleep 2
              done
              EXISTS="$(psql -h "$HOST" -U "$POSTGRES_USER" -d postgres -Atqc "SELECT 1 FROM pg_database WHERE datname='metabase'" 2>/dev/null | tr -d '[:space:]' || true)"
              if [ "${EXISTS}" = "1" ]; then
                echo "database metabase already exists"
              else
                psql -h "$HOST" -U "$POSTGRES_USER" -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE metabase;"
                echo "created database metabase"
              fi
