# Применяет DDL к БД из Secret postgres-credentials: все файлы из ConfigMap egisz-reports-schema
# в порядке, заданном в schema_apply_order.txt (по умолчанию 001 + 002 + 005).
# ConfigMap создаётся в start.ps1 (kubectl create configmap ... --from-file=...).
apiVersion: batch/v1
kind: Job
metadata:
  name: egisz-reports-schema-init
  namespace: egisz-monitor
spec:
  backoffLimit: 4
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: apply-schema
          image: postgres:16-bookworm
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
            - name: PGCLIENTENCODING
              value: UTF8
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              export PGPASSWORD="${POSTGRES_PASSWORD}"
              HOST="postgres"
              until pg_isready -h "$HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
                echo "waiting for postgres..."
                sleep 2
              done
              manifest="/schema/schema_apply_order.txt"
              if [[ ! -f "$manifest" ]]; then
                echo "missing $manifest in ConfigMap" >&2
                exit 1
              fi
              while IFS= read -r raw || [[ -n "${raw:-}" ]]; do
                [[ "$raw" =~ ^[[:space:]]*# ]] && continue
                line="${raw%%#*}"
                line="${line//$'\r'/}"
                line="${line#"${line%%[![:space:]]*}"}"
                line="${line%"${line##*[![:space:]]}"}"
                [[ -z "$line" ]] && continue
                f="/schema/$line"
                if [[ ! -f "$f" ]]; then
                  echo "missing file in ConfigMap (listed in schema_apply_order.txt): $f" >&2
                  exit 1
                fi
                echo "Applying $line ..."
                psql -v ON_ERROR_STOP=1 -h "$HOST" -U "$POSTGRES_USER" -d "$POSTGRES_DB" -f "$f"
              done < "$manifest"
              echo "egisz_reports schema applied (see schema_apply_order.txt)"
          volumeMounts:
            - name: schema
              mountPath: /schema
      volumes:
        - name: schema
          configMap:
            name: egisz-reports-schema
