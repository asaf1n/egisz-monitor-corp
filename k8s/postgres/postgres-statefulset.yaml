# PostgreSQL для DWH (Metabase / ETL). Данные на PVC.
# Тюнинг через args: -c key=value — canonical способ для образа postgres:* (см. docker-library/postgres
# entrypoint.sh: forward args в postgres). 25% RAM на shared_buffers (limit=2Gi).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-bookworm
          # Tuning параметры. shared_buffers=512MB (25% RAM-limit) — больше WAL-cache, меньше дисковых read'ов
          # для тяжёлых SELECT'ов Metabase. work_mem 16MB — одна страница ETL × ~5 sort'ов помещается без spill.
          # log_min_duration_statement=1000 — медленные запросы (>1s) попадают в `kubectl logs postgres-0`.
          args:
            - "-c"
            - "shared_buffers=512MB"
            - "-c"
            - "effective_cache_size=1536MB"
            - "-c"
            - "work_mem=16MB"
            - "-c"
            - "maintenance_work_mem=128MB"
            - "-c"
            - "max_wal_size=1GB"
            - "-c"
            - "min_wal_size=80MB"
            - "-c"
            - "wal_compression=on"
            - "-c"
            - "log_min_duration_statement=1000"
            - "-c"
            - "log_lock_waits=on"
            - "-c"
            - "log_temp_files=0"
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
            # Явный UTF-8 при первом initdb (новый PVC); уже созданный кластер не перекодируется.
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF8 --locale=C.UTF-8"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            # ETL с пагинацией 500 строк и UPSERT через execute_values + Metabase queries:
            # фактическое RSS 600-900Mi на ноутбуке. Поднимаем limit до 2Gi, чтобы OOMKilled
            # не отстрелил pod на пиковой ETL-странице с тяжёлыми JSON aggregation'ами.
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          # liveness initialDelaySeconds=120: shared_buffers=512MB + WAL replay при крэше
          # могут занимать > 60s. timeout 5s + failureThreshold 4 — даём 80s до restart.
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 120
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
