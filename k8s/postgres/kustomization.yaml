# Применение одной командой (после создания postgres-secret.yaml из примера):
#   kubectl apply -k egisz-monitor-corp/k8s/postgres/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: egisz-corp
resources:
  - namespace.yaml
  - postgres-statefulset.yaml
  - postgres-service.yaml
# Секрет не включён в репозиторий — создайте postgres-secret.yaml локально.
