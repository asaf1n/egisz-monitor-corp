# Скопируйте в postgres-credentials.yaml (или другое имя файла), замените пароли, примените:
#   kubectl apply -f k8s/postgres/postgres-credentials.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: egisz-corp
type: Opaque
stringData:
  POSTGRES_USER: "egisz_corp"
  POSTGRES_PASSWORD: "CHANGEME_STRONG_PASSWORD"
  POSTGRES_DB: "egisz_corp"
