# Скопируйте в postgres-credentials.yaml (или другое имя файла), замените пароли, примените:
#   kubectl apply -f k8s/postgres/postgres-credentials.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: egisz-monitor
type: Opaque
stringData:
  POSTGRES_USER: "egisz"
  POSTGRES_PASSWORD: "egisz"
  POSTGRES_DB: "egisz_reports"
