# Скопируйте в k8s/metabase-admin-secret.yaml (файл в .gitignore) или положитесь на start.ps1,
# который создаёт тот же набор при локальном деплое.
apiVersion: v1
kind: Secret
metadata:
  name: metabase-admin
  namespace: egisz-monitor
type: Opaque
stringData:
  email: "admin@egisz.local"
  password: "egisz"
  # Необязательно: экспорт дашбордов из Config UI через X-API-Key, если /api/session возвращает 401.
  # Создайте ключ в Metabase: Admin → Settings → Authentication → API Keys (группа с правами на дашборды).
  # api_key: "mb_..."
