apiVersion: v1
kind: Service
metadata:
  name: corp-web
  namespace: egisz-corp
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: corp-web
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corp-web
  namespace: egisz-corp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: corp-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: corp-web
    spec:
      containers:
        - name: web
          image: egisz-corp-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: EGISZ_CORP_CONFIG
              value: /app/config/egisz_corp.yaml
            - name: FLASK_RUN_HOST
              value: "0.0.0.0"
            - name: FLASK_RUN_PORT
              value: "8080"
          volumeMounts:
            - name: cfg
              mountPath: /app/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: cfg
          secret:
            secretName: egisz-corp-web-config
