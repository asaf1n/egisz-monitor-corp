# Секрет с SQLAlchemy-строкой для метаданных Airflow (официальный Helm chart, ключ connection).
# Пароль в connection должен совпадать с POSTGRES_PASSWORD в postgres-credentials.
#
#   cp k8s/airflow/airflow-metadata-secret.example.yaml k8s/airflow/airflow-metadata-secret.yaml
#   # замените CHANGEME_STRONG_PASSWORD и примените:
#   kubectl apply -f k8s/airflow/airflow-metadata-secret.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: airflow-metadata-connection
  namespace: egisz-monitor
type: Opaque
stringData:
  connection: postgresql+psycopg2://egisz:egisz@postgres.egisz-monitor.svc.cluster.local:5432/airflow
