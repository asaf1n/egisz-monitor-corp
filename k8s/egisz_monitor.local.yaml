# Конфиг для деплоя в Kubernetes на Windows (локальный Firebird на хосте).
# start.ps1 подставляет этот файл в Secret egisz-monitor-conf-ui-config.
#
# Firebird: из пода на Windows — host.docker.internal.

firebird:
  host: "host.docker.internal"
  port: 3050
  # Имя/алиас БД на хосте (см. Firebird aliases.conf). Часто proxy_egisz; дефис/подчёркивание должны совпадать с сервером.
  database: "proxy_egisz"
  user: "SYSDBA"
  password: "masterkey"
  # См. комментарий в config/egisz_monitor.example.yaml (кириллица Firebird).
  charset: "WIN1251"
  page_size: 4096

postgres:
  host: "postgres.egisz-monitor.svc.cluster.local"
  port: 5432
  database: "egisz_reports"
  user: "egisz"
  password: "egisz"
  schema: "public"

etl:
  batch_size: 1000
  pipeline_name: "firebird_exchangelog"
  sync_window_days: 0
  source_query: null
  # Таймаут SELECT к Firebird (сек.); в Config UI не редактируется — только YAML/Secret (см. config/egisz_monitor.example.yaml).
  firebird_query_timeout_sec: 900

auto_sync:
  enabled: false
  schedule_cron: "*/15 * * * *"
  timezone: "Etc/UTC"

metabase:
  # С ПК при port-forward Metabase на localhost:3000 (kubectl port-forward svc/metabase 3000:3000 или после .\start.ps1). Вход в Metabase: admin@egisz.local / egisz.
  site_url: "http://127.0.0.1:3000"

