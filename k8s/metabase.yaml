# Metabase OSS + провижининг (metabase/provision.sh, setup-dashboards.sh).
# Перед первым запуском: схема витрины (egisz-monitor Job или apply-schema) и секрет postgres.
# Первый администратор UI: email/password из Secret metabase-admin (репозиторий: admin@egisz.local / egisz, см. metabase-admin-secret.example.yaml).
# Docker Desktop: LoadBalancer maps to localhost:3000 automatically (no kubectl port-forward needed)
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: metabase
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  # Recreate: один под Metabase; без hostPort на ноде (иначе Pending при занятом :3000).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      # securityContext дублирует USER 1500:1500 из metabase/Dockerfile. Без явного runAsUser в k8s
      # containerd Docker Desktop иногда падает с «no users found» при резолвинге USER из image config
      # (multi-arch manifest list); явный numeric UID/GID решает проблему.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1500
        runAsGroup: 1500
        fsGroup: 1500
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metabase
          # Сборка: docker build -f metabase/Dockerfile -t egisz-monitor-metabase:latest . && docker tag egisz-monitor-metabase:latest egisz-monitor-metabase:local
          # IfNotPresent: Docker Desktop подставляет образ из локального Docker Engine (см. docs.docker.com/desktop/kubernetes).
          # Тег :k8s-v16 (не :local): bump при изменении Dockerfile/скриптов/дашбордов — иначе kubelet Docker Desktop держит старый digest для имени тега.
          # v16: verify по умолчанию без smoke-metabase-ui (быстрее до port-forward); VERIFY_FULL_UI_SMOKE=1 — опциональный UI-smoke.
          # v15: provision.sh идемпотентен (METABASE_FORCE_PROVISION=auto/true/false) — dashboards id не меняются при rollout restart;
          #      Dockerfile с --virtual + USER metabase + HEALTHCHECK; livenessProbe + JAVA_TOOL_OPTIONS для G1GC и MaxRAMPercentage.
          image: egisz-monitor-metabase:k8s-v16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              # Без hostPort: иначе на однонодовом кластере под часто зависает в Pending (порт 3000 занят
              # прошлым подом / процессом на хосте). Доступ: Service metabase (LoadBalancer → :3000 на Docker Desktop),
              # либо port-forward из start.ps1.
          env:
            - name: LANG
              value: "C.UTF-8"
            - name: LC_ALL
              value: "C.UTF-8"
            # provision.sh в том же поде ходит на API Metabase
            - name: MB_URL
              value: "http://localhost:3000"
            # 0 (default): verify-corp-stack.sh не вызывает smoke-metabase-ui (быстрее deploy/apply). 1 — доп. 7 HTTP-проверок UI/API.
            - name: VERIFY_FULL_UI_SMOKE
              value: "0"
            - name: MB_PASSWORD_COMPLEXITY
              value: "weak"
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: PGHOST
              value: "postgres.egisz-monitor.svc.cluster.local"
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: email
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: password
            - name: APP_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: APP_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: APP_DATABASE_DISPLAY_NAME
              value: "EGISZ Corp DWH"
            - name: METABASE_SITE_NAME
              value: "EGISZ Monitor Corp"
            - name: MB_SITE_URL
              value: "http://127.0.0.1:3000"
            # Application DB в Postgres (БД metabase). Иначе Metabase держит состояние во внутреннем хранилище
            # контейнера — rollout/redeploy не гарантируют повторный провижинг из образа. deploy/reset-deploy делают DROP/CREATE БД metabase; точечно: .\start.ps1 -Action reset-metabase.
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_HOST
              value: "postgres.egisz-monitor.svc.cluster.local"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: "metabase"
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            # Идемпотентный provisioning: если в БД metabase уже есть >= /app/metabase_dashboards/*.json,
            # provision.sh пропускает setup-dashboards.sh, dashboard ID сохраняются между restart'ами.
            # auto — детект по числу EGISZ дашбордов; true — всегда пересоздавать (через bump тега и
            # rollout restart); false — никогда (для отладки). Force re-provision: start.ps1 -Action reset-metabase.
            - name: METABASE_FORCE_PROVISION
              value: "auto"
            # JVM-тюнинг для контейнера: heap = 75% memory limit (G1GC; кратно snappier чем дефолтный
            # ParallelGC у Metabase), быстрый OOM-exit вместо «зависшего» pod'а — k8s рестартит чище.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true"
          volumeMounts:
            - name: shared
              mountPath: /shared
          # startupProbe: «холодный старт JVM + миграции» (до ~4 минут на ноутбуке). Пока он жив,
          # liveness/readiness не выполняются — kubelet не убивает pod даже если первое /api/health
          # отвечает только через 90s.
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            failureThreshold: 40
            periodSeconds: 6
            timeoutSeconds: 5
          # readiness берёт работу после startupProbe (initialDelaySeconds: 0). Делаем её агрессивной:
          # после прогрева JVM /api/health отвечает за <50 ms, поэтому tight loop без затяжек.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # liveness — последний рубеж: если 4 раза подряд /api/health не ответил — pod умер
          # (deadlock в Jetty / OOM без exit-code 137). 4 × 20s = 80s до restart.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: shared
          emptyDir: {}
