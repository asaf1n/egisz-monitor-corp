# Metabase OSS + провижининг (metabase/provision.sh, setup-dashboards.sh).
# Перед первым запуском: схема витрины (egisz-corp Job или apply-schema) и секрет postgres.
# Первый администратор UI: email/password из Secret metabase-admin (репозиторий: admin@egisz.local / egisz, см. metabase-admin-secret.example.yaml).
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: egisz-corp
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
      name: http
  selector:
    app.kubernetes.io/name: metabase
---
# Docker Desktop / k8s: внешний порт 3000 на 127.0.0.1 (бес kubectl port-forward). Если 3000 занят на хосте — порт-форвард: sm. docs/METABASE.md
apiVersion: v1
kind: Service
metadata:
  name: metabase-lb
  namespace: egisz-corp
  labels:
    app.kubernetes.io/name: metabase
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: metabase
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: egisz-corp
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  # hostPort:3000 не совместим с RollingUpdate: следующий pod не сможет занять порт, пока жив старый.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      containers:
        - name: metabase
          # Сборка: docker build -f metabase/Dockerfile -t egisz-corp-metabase:latest . && docker tag egisz-corp-metabase:latest egisz-corp-metabase:local
          # IfNotPresent: Docker Desktop подставляет образ из локального Docker Engine (см. docs.docker.com/desktop/kubernetes).
          # Тег :k8s-v4 (не :local): bump при изменении Dockerfile/скриптов — иначе kubelet Docker Desktop держит старый digest для имени тега.
          image: egisz-corp-metabase:k8s-v4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              # Локальная отладка (Docker Desktop / kind): с хоста — http://127.0.0.1:3000/ без port-forward
              hostPort: 3000
          env:
            - name: LANG
              value: "C.UTF-8"
            - name: LC_ALL
              value: "C.UTF-8"
            # provision.sh в том же поде ходит на API Metabase
            - name: MB_URL
              value: "http://localhost:3000"
            - name: MB_PASSWORD_COMPLEXITY
              value: "weak"
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: PGHOST
              value: "postgres.egisz-corp.svc.cluster.local"
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: email
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: password
            - name: APP_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: APP_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: APP_DATABASE_DISPLAY_NAME
              value: "EGISZ Corp DWH"
            - name: METABASE_SITE_NAME
              value: "EGISZ Monitor Corp"
            - name: MB_SITE_URL
              value: "http://127.0.0.1:3000"
            # Application DB в Postgres (БД metabase). Иначе Metabase держит состояние во внутреннем хранилище
            # контейнера — rollout/redeploy не гарантируют повторный провижинг из образа. deploy/reset-deploy делают DROP/CREATE БД metabase; точечно: .\start.ps1 -Action reset-metabase.
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_HOST
              value: "postgres.egisz-corp.svc.cluster.local"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: "metabase"
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: shared
              mountPath: /shared
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 20
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: shared
          emptyDir: {}
