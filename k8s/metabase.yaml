# Metabase OSS + провижининг (metabase/provision.sh, setup-dashboards.sh).
# Перед первым запуском: схема витрины (egisz-monitor Job или apply-schema) и секрет postgres.
# Первый администратор UI: email/password из Secret metabase-admin (репозиторий: admin@egisz.local / egisz, см. metabase-admin-secret.example.yaml).
apiVersion: v1
kind: Service
metadata:
  name: metabase
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: metabase
  finalizers: []
spec:
  type: LoadBalancer
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: metabase
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metabase
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: metabase
spec:
  replicas: 1
  # Recreate: один под Metabase; без hostPort на ноде (иначе Pending при занятом :3000).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: metabase
  template:
    metadata:
      labels:
        app.kubernetes.io/name: metabase
    spec:
      # securityContext дублирует USER 1500:1500 из metabase/Dockerfile. Без явного runAsUser в k8s
      # containerd Docker Desktop иногда падает с «no users found» при резолвинге USER из image config
      # (multi-arch manifest list); явный numeric UID/GID решает проблему.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1500
        runAsGroup: 1500
        fsGroup: 1500
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: metabase
          # Сборка из корня репозитория (пересборка после правок JSON/скриптов):
          #   docker rmi egisz-monitor-metabase:latest 2>nul
          #   docker build -f metabase/Dockerfile -t egisz-monitor-metabase:latest .
          # start.ps1 (deploy / restart-metabase) дополнительно ставит уникальный тег latest-<utc> на kind/docker-desktop, чтобы под точно взял свежий слой.
          image: egisz-monitor-metabase:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
              # Service metabase (LoadBalancer); на Docker Desktop часто :3000 на localhost — иначе port-forward из start.ps1.
          env:
            - name: LANG
              value: "C.UTF-8"
            - name: LC_ALL
              value: "C.UTF-8"
            # provision.sh в том же поде ходит на API Metabase
            - name: MB_URL
              value: "http://localhost:3000"
            - name: MB_PASSWORD_COMPLEXITY
              value: "weak"
            - name: MB_PASSWORD_LENGTH
              value: "4"
            - name: PGHOST
              value: "postgres.egisz-monitor.svc.cluster.local"
            - name: METABASE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: email
            - name: METABASE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metabase-admin
                  key: password
            - name: APP_DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
            - name: APP_DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: APP_DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: APP_DATABASE_DISPLAY_NAME
              value: "EGISZ Corp DWH"
            - name: METABASE_SITE_NAME
              value: "EGISZ Monitor Corp"
            - name: MB_SITE_URL
              value: "http://127.0.0.1:3000"
            # Application DB в Postgres (БД metabase). Иначе Metabase держит состояние во внутреннем хранилище
            # контейнера — rollout/redeploy не гарантируют повторный провижинг из образа. deploy/reset-deploy делают DROP/CREATE БД metabase; точечно: METABASE_FORCE_PROVISION или полный deploy.
            - name: MB_DB_TYPE
              value: "postgres"
            - name: MB_DB_HOST
              value: "postgres.egisz-monitor.svc.cluster.local"
            - name: MB_DB_PORT
              value: "5432"
            - name: MB_DB_DBNAME
              value: "metabase"
            - name: MB_DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: MB_DB_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            # Идемпотентный provisioning: METABASE_FORCE_PROVISION=auto пропускает setup-dashboards, если
            # число дашбордов в Metabase ≥ числу *.json *и* SHA всего набора JSON совпадает со штампом в /shared
            # (corp-metabase-dashboards-manifest.sha256 после последнего успешного импорта). true — всегда; false — никогда.
            - name: METABASE_FORCE_PROVISION
              value: "auto"
            # JVM-тюнинг для контейнера: heap = 75% memory limit (G1GC; кратно snappier чем дефолтный
            # ParallelGC у Metabase), быстрый OOM-exit вместо «зависшего» pod'а — k8s рестартит чище.
            # Структурированное логирование: -Dlogback.configurationFile=/app/logback.xml (опционально).
            # ExitOnOutOfMemoryError: падение контейнера вместо Full GC loop → kubelet рестартит быстро.
            # UseG1GC: латенси-ориентированный GC (вместо старого ParallelGC) — снижает tail latency.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/heapdump.hprof"
          volumeMounts:
            - name: shared
              mountPath: /shared
          # startupProbe: холодный старт JVM + миграции (до ~4 мин на ноутбуке). Пока он жив, liveness/readiness
          # не выполняются — kubelet не убивает pod даже если первое /api/health отвечает только через 90s.
          # failureThreshold: 120 × periodSeconds=6 = 12 min (избегаем CrashLoop на первый холодный старт).
          startupProbe:
            httpGet:
              path: /api/health
              port: 3000
            failureThreshold: 120
            periodSeconds: 6
            timeoutSeconds: 5
          # readiness берёт работу после startupProbe (initialDelaySeconds: 0). Tight loop: после прогрева
          # JVM /api/health отвечает за <50 ms, поэтому агрессивная настройка. 3 × 10 = 30s до NotReady.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # liveness — последний рубеж: 4 раза подряд fail = restart (обход deadlock в Jetty).
          # 4 × 20s = 80s до restart. Слабее readiness, чтобы не срывать pod при временном lag.
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 0
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 4
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: shared
          emptyDir: {}
