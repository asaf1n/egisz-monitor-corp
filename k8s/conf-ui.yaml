# Config UI (Flask): редактирование YAML конфигурации EGISZ Corp.
# NodePort — доступ с хоста Windows без kubectl port-forward (Docker Desktop / kind).
# Рабочая копия YAML в emptyDir (запись из UI); при новом поде init снова копирует из Secret. Другие Job’ы читают Secret — обновляйте его при необходимости (deploy / kubectl apply).
apiVersion: v1
kind: Service
metadata:
  name: conf-ui
  namespace: egisz-monitor
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
      name: http
  selector:
    app.kubernetes.io/name: conf-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conf-ui
  namespace: egisz-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: conf-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: conf-ui
    spec:
      # Секрет K8s только для чтения: без копии в emptyDir Flask не может записать YAML (POST /save → 500).
      initContainers:
        - name: seed-config
          image: busybox:1.36
          command: ["sh", "-c", "set -e; cp /seed/egisz_corp.yaml /work/egisz_corp.yaml"]
          volumeMounts:
            - name: cfg-secret
              mountPath: /seed
              readOnly: true
            - name: cfg-work
              mountPath: /work
      containers:
        - name: conf-ui
          # Тег corp-web пересобирается из latest в start.ps1 (Invoke-DockerBuild), чтобы Docker Desktop K8s подхватывал новый digest.
          image: egisz-conf-ui:corp-web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
            - name: PYTHONUTF8
              value: "1"
            - name: EGISZ_CORP_CONFIG
              value: /app/config/egisz_corp.yaml
            - name: FB_CLIENT_LIBRARY
              value: "/usr/local/lib/libfbclient.so"
            - name: EGISZ_CORP_SQL_DIR
              value: "/app/sql"
            - name: FLASK_RUN_HOST
              value: "0.0.0.0"
            - name: FLASK_RUN_PORT
              value: "8080"
          volumeMounts:
            - name: cfg-work
              mountPath: /app/config
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: cfg-secret
          secret:
            secretName: egisz-monitor-conf-ui-config
        - name: cfg-work
          emptyDir: {}
