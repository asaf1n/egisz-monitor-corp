# Config UI (Flask): редактирование YAML конфигурации EGISZ Monitor.
# Service conf-ui: LoadBalancer — доступ с хоста без port-forward при поддерживаемом LB (Docker Desktop и т.п.).
# Рабочая копия YAML в emptyDir (запись из UI); при новом поде init снова копирует из Secret. Другие Job'ы читают Secret — обновляйте его при необходимости (deploy / kubectl apply).
#
# ServiceAccount + Role: POST /save применяет auto_sync к CronJob egisz-monitor-sync (suspend/schedule/timeZone).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: conf-ui
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: conf-ui
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: conf-ui-patch-sync-cronjob
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: conf-ui
rules:
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    resourceNames: ["egisz-monitor-sync"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: conf-ui-patch-sync-cronjob
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: conf-ui
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: conf-ui-patch-sync-cronjob
subjects:
  - kind: ServiceAccount
    name: conf-ui
    namespace: egisz-monitor
---
apiVersion: v1
kind: Service
metadata:
  name: conf-ui
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: conf-ui
  finalizers: []
spec:
  type: LoadBalancer
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app.kubernetes.io/name: conf-ui
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: conf-ui
  namespace: egisz-monitor
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: conf-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: conf-ui
  namespace: egisz-monitor
spec:
  replicas: 1
  # maxUnavailable=0 + maxSurge=1: новый под становится Ready (через /healthz) до отстрела старого —
  # устраняет окно «Failed to fetch» в браузере при .\start.ps1 -Action apply / restart-conf-ui.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: conf-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: conf-ui
    spec:
      serviceAccountName: conf-ui
      # preStop sleep + grace 45s: даём kube-proxy убрать endpoint до SIGTERM Flask и закрыть
      # текущие fetch'и без TypeError: Failed to fetch.
      terminationGracePeriodSeconds: 45
      # non-root по умолчанию (UID 10001 в docker/web/Dockerfile). fsGroup=10001 расставляет
      # group-write на emptyDir cfg-work — POST /save может перезаписать YAML, init-container
      # busybox от root читает Secret и пишет в /work, права наследуются группе app.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # Секрет K8s только для чтения: без копии в emptyDir Flask не может записать YAML (POST /save → 500).
      initContainers:
        - name: seed-config
          image: busybox:1.36
          # init-container запускается от root (см. отдельный securityContext), копирует Secret в emptyDir
          # и выставляет права чтения для группы app — без этого non-root pod не сможет открыть YAML.
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
          command: ["sh", "-c", "set -e; cp /seed/egisz_monitor.yaml /work/egisz_monitor.yaml; chmod 0660 /work/egisz_monitor.yaml"]
          volumeMounts:
            - name: cfg-secret
              mountPath: /seed
              readOnly: true
            - name: cfg-work
              mountPath: /work
      containers:
        - name: conf-ui
          # Тег sync-web пересобирается из latest в start.ps1 (Invoke-DockerBuild), чтобы Docker Desktop K8s подхватывал новый digest.
          image: egisz-conf-ui:sync-web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          # gunicorn (см. docker/web/Dockerfile CMD) сам слушает 0.0.0.0:8080 — переменные FLASK_RUN_*
          # не нужны и могли путать читателей. EGISZ_MONITOR_CONFIG / EGISZ_MONITOR_SQL_DIR / FB_CLIENT_LIBRARY
          # уже встроены в образ как ENV, оставляем здесь для прозрачности.
          env:
            - name: LANG
              value: C.UTF-8
            - name: LC_ALL
              value: C.UTF-8
            - name: PYTHONUTF8
              value: "1"
            - name: EGISZ_MONITOR_CONFIG
              value: /app/config/egisz_monitor.yaml
            - name: FB_CLIENT_LIBRARY
              value: "/usr/local/lib/libfbclient.so"
            - name: EGISZ_MONITOR_SQL_DIR
              value: "/app/sql"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: cfg-work
              mountPath: /app/config
          # /healthz не дергает Postgres/Firebird — pod помечается Ready сразу как Flask поднялся,
          # а недоступность бэкендов диагностируется через /api/healthcheck без срыва readinessProbe.
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 4
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
      volumes:
        - name: cfg-secret
          secret:
            secretName: egisz-monitor-conf-ui-config
        - name: cfg-work
          emptyDir: {}
