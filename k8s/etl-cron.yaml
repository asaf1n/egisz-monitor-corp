# Периодический sync Firebird → Postgres. Образ и Secret — как у Deployment conf-ui.
# suspend: true — по умолчанию выключено; расписание и intent см. auto_sync в egisz_monitor.yaml.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: egisz-monitor-sync
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: egisz-monitor-sync
    app.kubernetes.io/component: etl
spec:
  suspend: true
  schedule: "*/15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      # Полный цикл на реальной FB/PG часто >30 мин; 1800 с убивал pod до UPSERT фактов → витрина 0, Metabase пустой.
      activeDeadlineSeconds: 21600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: egisz-monitor-sync
            app.kubernetes.io/component: etl
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 60
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: seed-config
              image: busybox:1.36
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
              command:
                - sh
                - -c
                - "set -e; cp /seed/egisz_monitor.yaml /work/egisz_monitor.yaml; chmod 0660 /work/egisz_monitor.yaml"
              volumeMounts:
                - name: cfg-secret
                  mountPath: /seed
                  readOnly: true
                - name: cfg-work
                  mountPath: /work
          containers:
            - name: sync
              image: egisz-conf-ui:sync-web
              imagePullPolicy: IfNotPresent
              command: ["egisz-monitor", "sync"]
              env:
                - name: LANG
                  value: C.UTF-8
                - name: LC_ALL
                  value: C.UTF-8
                - name: PYTHONUTF8
                  value: "1"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: EGISZ_MONITOR_CONFIG
                  value: /app/config/egisz_monitor.yaml
                - name: FB_CLIENT_LIBRARY
                  value: "/usr/local/lib/libfbclient.so"
                - name: EGISZ_MONITOR_SQL_DIR
                  value: "/app/sql"
              volumeMounts:
                - name: cfg-work
                  mountPath: /app/config
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "1500m"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: cfg-secret
              secret:
                secretName: egisz-monitor-conf-ui-config
            - name: cfg-work
              emptyDir: {}
