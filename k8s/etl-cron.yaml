# CronJob: периодический sync Firebird → Postgres каждые 15 минут.
# Использует тот же образ что conf-ui (egisz-conf-ui:corp-web), CLI `egisz-monitor sync`,
# конфиг — Secret egisz-monitor-conf-ui-config (через init-container, как в Deployment).
#
# Single-flight: pg_try_advisory_lock(hash(pipeline_name)) в run_sync блокирует
# параллельный запуск из UI-кнопки. Если CronJob тикнул во время ручного запуска —
# CLI выйдет с кодом 75 (sync_skipped), Job будет Failed, но без двойной записи в PG.
#
# concurrencyPolicy: Forbid — даже без advisory lock'а Kubernetes не запустит второй pod,
# пока предыдущий не завершился (защита от долгого Firebird, перекрывающего следующий слот).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: egisz-corp-sync
  namespace: egisz-monitor
  labels:
    app.kubernetes.io/name: egisz-corp-sync
    app.kubernetes.io/component: etl
spec:
  schedule: "*/15 * * * *"
  timeZone: "Etc/UTC"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 3600
      activeDeadlineSeconds: 1800
      template:
        metadata:
          labels:
            app.kubernetes.io/name: egisz-corp-sync
            app.kubernetes.io/component: etl
        spec:
          restartPolicy: OnFailure
          terminationGracePeriodSeconds: 60
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            - name: seed-config
              image: busybox:1.36
              securityContext:
                runAsNonRoot: false
                runAsUser: 0
              command:
                - sh
                - -c
                - "set -e; cp /seed/egisz_corp.yaml /work/egisz_corp.yaml; chmod 0660 /work/egisz_corp.yaml"
              volumeMounts:
                - name: cfg-secret
                  mountPath: /seed
                  readOnly: true
                - name: cfg-work
                  mountPath: /work
          containers:
            - name: sync
              image: egisz-conf-ui:corp-web
              imagePullPolicy: IfNotPresent
              command: ["egisz-monitor", "sync"]
              env:
                - name: LANG
                  value: C.UTF-8
                - name: LC_ALL
                  value: C.UTF-8
                - name: PYTHONUTF8
                  value: "1"
                - name: PYTHONUNBUFFERED
                  value: "1"
                - name: EGISZ_CORP_CONFIG
                  value: /app/config/egisz_corp.yaml
                - name: FB_CLIENT_LIBRARY
                  value: "/usr/local/lib/libfbclient.so"
                - name: EGISZ_CORP_SQL_DIR
                  value: "/app/sql"
              volumeMounts:
                - name: cfg-work
                  mountPath: /app/config
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "1500m"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: ["ALL"]
          volumes:
            - name: cfg-secret
              secret:
                secretName: egisz-monitor-conf-ui-config
            - name: cfg-work
              emptyDir: {}
