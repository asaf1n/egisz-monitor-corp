# Рабочий конфиг (не коммитить прод-секреты). Полный шаблон и комментарии: config/egisz_monitor.example.yaml
firebird:
  host: localhost
  port: 3050
  database: proxy_egisz
  user: SYSDBA
  password: masterkey
  # Кириллица JPERSONS: при «????» в Metabase см. docs/METABASE.md; для UTF8-БД верните UTF8.
  charset: WIN1251
  page_size: 4096
postgres:
  host: postgres.egisz-monitor.svc.cluster.local
  port: 5432
  database: egisz_reports
  user: egisz
  password: egisz
  schema: public
etl:
  batch_size: 500
  pipeline_name: firebird_exchangelog
  sync_window_days: 10
  source_query: null
  interleave_page_rows: 8192
auto_sync:
  enabled: false
  schedule_cron: "*/15 * * * *"
  timezone: "Etc/UTC"
metabase:
  site_url: http://localhost:3000
