# Рабочий конфиг (не коммитить прод-секреты). Полный шаблон и комментарии: config/egisz_monitor.example.yaml
firebird:
  host: localhost
  port: 3050
  database: proxy_egisz
  user: SYSDBA
  password: masterkey
  charset: WIN1251
  page_size: 4096
postgres:
  host: postgres.egisz-monitor.svc.cluster.local
  port: 5432
  database: egisz_reports
  user: egisz
  password: egisz
  schema: public
etl:
  batch_size: 1000
  pipeline_name: firebird_exchangelog
  # Окно выборки по датам (EXCHANGELOG.LOGDATE / EGISZ_MESSAGES.CREATEDATE).
  # Ненулевое значение нужно, чтобы витрина «06 Архив СЭМД» быстро покрывала все документы за период,
  # даже если курсоры (last_log_id/last_egmid) отстают от текущего хвоста Firebird.
  sync_window_days: 60
  source_query: null
auto_sync:
  enabled: false
  schedule_cron: "*/15 * * * *"
  timezone: "Etc/UTC"
metabase:
  site_url: http://localhost:3000
