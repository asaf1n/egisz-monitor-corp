# Copy to config/egisz_monitor.yaml (or set EGISZ_MONITOR_CONFIG to absolute path).
# start.ps1 creates egisz_monitor.yaml from this file if missing.
#
# Firebird:
# - С этой же машины Windows, где крутится Firebird: host localhost.
# - Из Docker / Kubernetes на Windows к хосту: host.docker.internal (или IP хоста).
# - Внутри кластера к сервису Postgres: имя сервиса из k8s (см. k8s/README.md).

firebird:
  host: "localhost"
  port: 3050
  database: "proxy_egisz"
  user: "SYSDBA"
  password: "masterkey"
  # Кириллица в JPERSONS.JNAME: в типичных БД Infoclinica — WIN1251; если строки в Metabase — «????», попробуйте WIN1251 и перезапустите ETL. Для БД в UTF8 оставьте UTF8.
  charset: "WIN1251"
  page_size: 4096

# В Kubernetes витрина — сервис postgres в namespace egisz-monitor (из пода conf-ui).
# С хоста Windows: kubectl -n egisz-monitor port-forward svc/postgres 5432:5432 и host localhost / порт 5432.
postgres:
  host: "postgres.egisz-monitor.svc.cluster.local"
  port: 5432
  database: "egisz_reports"
  user: "egisz"
  password: "egisz"
  schema: "public"

etl:
  batch_size: 500
  pipeline_name: "firebird_exchangelog"
  # Окно по датам в Firebird: EXCHANGELOG.LOGDATE и EGISZ_MESSAGES.CREATEDATE (DATEADD -N DAY TO CURRENT_TIMESTAMP).
  # 0 или отрицательное — синхронизация по всем записям (без предиката по дате) для журнала, снимка сообщений и исходящих;
  # для stg_egisz_messages_journal — TRUNCATE + сброс messages_snapshot_high_egmid, затем полный проход EGISZ_MESSAGES в FB.
  sync_window_days: 30
  # Игнорируется пайплайном: журнал всегда строится из встроенного SELECT по EXCHANGELOG.LOGID.
  source_query: null
  # Таймаут (сек.) каждого SELECT к Firebird в ETL (не настраивается в Config UI; задайте здесь или через CI/Secret).
  # firebird_query_timeout_sec: 900
  # Не настраивается в UI: COUNT для прогресса в Firebird не выполняется.
  # skip_firebird_progress_count: false
  # Опционально: макс. размер MSGTEXT в байтах UTF-8; больше — строка журнала пропускается (stg_parse_errors: MSGTEXT_TOO_LARGE). null = без лимита.
  # max_msgtext_bytes: 4194304
  # Размер одного UPSERT фактов в PostgreSQL (строк за один execute_values); больше буфера — несколько батчей и COMMIT между ними.
  # facts_upsert_chunk_size: 500
  # Лимит statement_timeout в секундах на каждый батч UPSERT (SET LOCAL); null = не задавать для этого шага.
  # pg_upsert_statement_timeout_sec: 120

auto_sync:
  # В k8s: при «Сохранить в YAML» и при `start.ps1` apply патчится CronJob `egisz-monitor-sync`:
  # spec.suspend = not enabled, плюс schedule_cron и timezone. RBAC: ServiceAccount `conf-ui` (см. k8s/conf-ui.yaml).
  enabled: false
  schedule_cron: "*/15 * * * *"
  timezone: "Etc/UTC"

metabase:
  # Site URL в настройках Metabase. Учётка администратора UI: admin@egisz.local / egisz (k8s: Secret metabase-admin).
  site_url: "http://localhost:3000"
